<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Dino Game</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav>
    <a href="index.html" class="logo-link">🦖 DINO WORLD</a>

    <div class="nav-links">
        <a href="../index.html" class="menu-items">Home</a>
        <a href="../pages/about.html" class="menu-items">About</a>
        <a href="../pages/contact.html" class="menu-items">Contact</a>
        
        <a href="game.html" class="game-btn">Game Zone →</a>
    </div>
</nav>
    <div class="contact-container">
        <h1>Get in Touch!</h1>
        
        <form id="contactForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email">
                <div class="error" id="emailError"></div>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea id="message" rows="4" placeholder="Enter your message"></textarea>
                <div class="error" id="messageError"></div>
            </div>

            <button type="submit">Submit</button>
            <div id="successMsg"></div>
        </form>

        <div class="direct-email">
            <p>Or email us directly at:</p>
            <p><strong>hello@dinoworld.dey</strong></p>
        </div>

        <div class="dino-message">
            <p>🦖 Dino Message: We'll reply within a roar! 🦕</p>
        </div>
    </div>

<footer>
    <div class="footer-container">
        <div class="footer-brand">
            <h3>🦖 DINO WORLD</h3>
            <p>&copy; 2026 Dino Game. <br> Mastering Web Development.</p>
        </div>

        <div class="footer-links">
            <h4>Quick Links</h4>
            <a href="index.html">Home</a>
            <a href="about.html">About Team</a>
            <a href="contact.html">Contact Us</a>
        </div>

        <div class="footer-newsletter">
            <h4>Newsletter</h4>
            <p>Get updated about latest games</p>
            <form class="footer-form">
                <input type="email" placeholder="User Email...">
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>
</footer>   

    <script src="../js/script.js"></script>
</body>
</html>
